<lib-form-input-group
[controlName]="controlName"
[label]="label"
[notes]="notes"
[template]="template"
[validations]="validations">
</lib-form-input-group>

<ng-template #template>
    <div class="catalog-container"
    [class.show]="showDropDown"
    [ngStyle]="maxHeight > 0 && { 'max-height.px': maxHeight } || null">
        <lib-form-input #input
        [class.fixed-content]="readOnly && !useCriteria"
        [autofocus]="autofocus"
        [controlName]="displayControlName"
        [invalid]="isInvalid && isTouched"
        [readOnly]="readOnly"
        (blur)="onBlur()"
        (click)="onClick()"
        (focus)="onFocus()">
        </lib-form-input>
    </div>
</ng-template>

<ng-template #dropdownTemplate>
    <div class="dropdown-container">
        <ul class="dropdown"
        [class.right]="right"
        [class.visible]="showDropDown">
            <li *ngIf="loading">{{ 'Loading...' }}</li>

            <li *ngIf="useCriteria && showMessage">Type {{ minimumLengthSearch }} or more characters to match results.</li>

            <li class="dropdown-item" *ngFor="let entry of entries"
            [class.selected]="selectedValue === entry.value"
            (click)="selectItem(entry)">
                {{ entry.display }}
            </li>
        </ul>
    </div>
</ng-template>
