<li
[class.collapsed]="collapsed"
[class.expanded]="expanded"
[class.selected]="item && item.selected"
[class.first-level]="isFirstLevel"
>
    <a #linkContainer
    [class.sub-items]="item && item.childCount > 0"
    
    [ngClass]="[ itemClassName ]"
    (click)="onSelectItem()">
        <i class="fa-solid fa-fw" [ngClass]="item?.icon ?? ''"></i>
        <span>{{ (item?.label ?? '') | translate }}</span>
    </a>

    <ul *ngIf="item && item.childCount > 0"
    [class.open]="item && item.selected"
    [ngStyle]="{
        'height.px': childHeight,
        'max-height.px': childHeight
    }">
        <div class="loading" [class.hidden]="item && item.children && item.children.length > 0">
            <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span>{{ configs.loadingText }}</span>
        </div>

        <div *ngIf="item && item.children">
            <lib-navigation-item *ngFor="let subitem of item.children"
            [configs]="configs"
            [item]="subitem"
            [itemClassName]="itemClassName"
            [level]="level + 1">
            </lib-navigation-item>
        </div>
    </ul>
</li>
