<nav
[ngClass]="[
    configs.collapsedClassName,
    collapsed && !expand ? 'collapsed' : configs.expandedClassName
]">
    <div class="navigation-container"
    [ngClass]="[ expand ? 'expand ' + configs.expandClassName : '' ]">
        <div class="header">
            <div class="logo-container">
                <div class="logo-collapsed" [ngClass]="[configs.collapsedClassName]">
                    <ng-content select="[logo-collapsed]"></ng-content>
                </div>
                <div class="logo-expanded" [ngClass]="[configs.expandedClassName]">
                    <ng-content select="[logo-expanded]"></ng-content>
                </div>
            </div>
    
            <div class="profile-container" *ngIf="profileName">
                <div class="picture" *ngIf="profileImage">
                    <img [src]="profileImage" />
                </div>
    
                <div class="profile">
                    <h4 *ngIf="profileName">{{ profileName }}</h4>
                    <h5 *ngIf="profileTitle">{{ profileTitle }}</h5>
                </div>
            </div>
        </div>    
    
        <div class="navigation-items">
            <ul *ngIf="items.length > 0">
                <lib-navigation-item *ngFor="let item of items"
                [configs]="configs"
                [item]="item"
                [itemClassName]="configs.itemClassName ?? ''">
                </lib-navigation-item>
            </ul>

            <div class="loading" *ngIf="items.length === 0">
                <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>{{ configs.loadingText }}</span>
            </div>
        </div>
    </div>
</nav>

<div class="drop-shadow" [class.show]="expand"></div>
