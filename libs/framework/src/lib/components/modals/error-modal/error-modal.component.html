<lib-modal
position="top"
[closeButtonText]="'Button-Modal-Close' | translate"
[size]="size"
[title]="title | translate"
(closed)="closed.emit()">
    <div body>
        <div class="erro">
            <h4>{{ errorMessage | translate }}</h4>
            <span *ngIf="subtitle">{{ subtitle | translate }}</span>
        </div>
    </div>
</lib-modal>
