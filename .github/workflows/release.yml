name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release ${{ matrix.package.project }}
    runs-on: ubuntu-latest
    environment: npm
    strategy:
      fail-fast: false
      matrix:
        package:
          - project: library
            working-directory: libs/library
          - project: framework
            working-directory: libs/framework
          - project: shared
            working-directory: libs/shared

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install release tooling
        run: |
          npm install --no-save \
            semantic-release \
            semantic-release-monorepo \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/npm \
            @semantic-release/github

      - name: Build ${{ matrix.package.project }}
        run: npx nx run ${{ matrix.package.project }}:build --configuration=production

      - name: Release ${{ matrix.package.project }}
        working-directory: ${{ matrix.package.working-directory }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx --no-install semantic-release -e semantic-release-monorepo
