name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  actions: read
  id-token: write
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release ${{ matrix.package.project }}
    runs-on: ubuntu-latest
    environment: npm
    strategy:
      fail-fast: false
      matrix:
        package:
          - project: library
            working-directory: libs/library
          - project: framework
            working-directory: libs/framework
          - project: shared
            working-directory: libs/shared

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install release tooling
        run: |
          npm install --no-save \
            semantic-release \
            semantic-release-monorepo \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/npm

      - name: Build ${{ matrix.package.project }}
        run: npx nx run ${{ matrix.package.project }}:build --configuration=production

      - name: Release ${{ matrix.package.project }}
        working-directory: ${{ matrix.package.working-directory }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx --no-install semantic-release -e semantic-release-monorepo

      - name: Capture released tag
        if: success()
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p released-tags
          git fetch --force --tags
          git tag --points-at "$GITHUB_SHA" --list '${{ matrix.package.project }}-v*' | sort -u > "released-tags/${{ matrix.package.project }}.txt"

      - name: Upload released tag
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: released-tags-${{ matrix.package.project }}
          path: released-tags/${{ matrix.package.project }}.txt
          if-no-files-found: ignore

  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: release
    if: ${{ always() }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download released package tags
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: released-tags-*
          path: released-tags
          merge-multiple: true

      - name: Find package tags
        id: package-tags
        shell: bash
        run: |
          set -euo pipefail

          git fetch --force --tags

          if [ ! -d released-tags ]; then
            echo "No released tag artifacts were found."
            echo "released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          tags="$(find released-tags -type f -name '*.txt' -exec cat {} \; | sort -u)"

          if [ -z "$tags" ]; then
            echo "No package tags were created for this commit."
            echo "released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          release_tag="$(printf '%s\n' "$tags" | head -n 1)"

          {
            echo "released=true"
            echo "release_tag=$release_tag"
            echo "tags<<EOF"
            printf '%s\n' "$tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create aggregate GitHub release
        if: steps.package-tags.outputs.released == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.package-tags.outputs.release_tag }}
          PACKAGE_TAGS: ${{ steps.package-tags.outputs.tags }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "GitHub release already exists for $RELEASE_TAG."
            exit 0
          fi

          {
            echo "Published packages:"
            echo

            while IFS= read -r tag; do
              [ -n "$tag" ] || continue

              case "$tag" in
                library-v*)
                  package="@zambon-dev/library"
                  version="${tag#library-v}"
                  ;;
                framework-v*)
                  package="@zambon-dev/framework"
                  version="${tag#framework-v}"
                  ;;
                shared-v*)
                  package="@zambon-dev/shared"
                  version="${tag#shared-v}"
                  ;;
                *)
                  continue
                  ;;
              esac

              echo "- ${package}@${version} (${tag})"
            done <<< "$PACKAGE_TAGS"

            echo
            echo "Changes:"
            echo

            if [ -n "${BEFORE_SHA:-}" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
              git log --pretty=format:'- %s (%h)' "${BEFORE_SHA}..${GITHUB_SHA}"
            else
              git log --pretty=format:'- %s (%h)' -20 "$GITHUB_SHA"
            fi
          } > release-notes.md

          gh release create "$RELEASE_TAG" \
            --title "ZLibraries package release" \
            --notes-file release-notes.md \
            --target "$GITHUB_SHA"
