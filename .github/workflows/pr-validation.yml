name: PR Validation

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

jobs:
  validate:
    name: Build validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set Nx SHAs
        uses: nrwl/nx-set-shas@v4

      - name: Build affected packages
        run: npx nx affected --target=build --base=$NX_BASE --head=$NX_HEAD --configuration=production

      - name: Build affected Storybooks
        run: npx nx affected --target=build-storybook --base=$NX_BASE --head=$NX_HEAD --configuration=ci
